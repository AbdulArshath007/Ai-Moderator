<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLITCHCON 2.0 - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            border-radius: 36px;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 9999px;
            /* Pill shape for liquid look */
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            box-shadow:
                0 15px 25px rgba(234, 62, 154, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            transition: border-color 0.2s;
        }

        .glass-input:focus {
            border-color: #ea3e9a;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            transition: all 0.3s;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-dot {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .badge-danger {
            background: linear-gradient(135deg, #ff1744, #d50000);
            box-shadow: 0 2px 8px rgba(255, 23, 68, 0.4);
        }

        .badge-warn {
            background: linear-gradient(135deg, #ff9100, #ff6d00);
            box-shadow: 0 2px 8px rgba(255, 145, 0, 0.3);
        }

        .badge-safe {
            background: linear-gradient(135deg, #00e676, #00c853);
            box-shadow: 0 2px 8px rgba(0, 230, 118, 0.3);
        }

        .tab-active {
            background: rgba(234, 62, 154, 0.15);
            border-color: #ea3e9a;
            color: #ea3e9a;
        }
    </style>
</head>

<body class="antialiased min-h-screen">


    <!-- DASHBOARD -->
    <div id="dashboard">
        <!-- Header -->
        <div class="border-b border-white/5 bg-black/40 backdrop-blur-xl sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#ff0ade] to-[#ea3e9a] flex items-center justify-center shadow-[0_0_15px_rgba(234,62,154,0.3)]">
                        <i class="ph-fill ph-shield-star text-xl text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">Teacher Dashboard</h1>
                        <p class="text-[11px] text-gray-500 flex items-center gap-1"><span
                                class="w-1.5 h-1.5 bg-green-500 rounded-full pulse-dot"></span> Live Monitoring</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="#" onclick="openChatAsTeacher()"
                        class="glass-btn px-4 py-2 rounded-lg text-xs font-medium text-gray-300 hover:text-white flex items-center gap-1.5 cursor-pointer">
                        <i class="ph ph-chat-dots"></i> Chat App
                    </a>
                    <button id="logout-btn"
                        class="glass-btn px-4 py-2 rounded-lg text-xs font-medium text-gray-300 hover:text-red-400 flex items-center gap-1.5 cursor-pointer">
                        <i class="ph ph-sign-out"></i> Logout
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 py-6 flex flex-col gap-6">

            <!-- Stats Row -->
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4" id="stats-row">
                <div class="stat-card rounded-xl p-4 flex flex-col gap-1">
                    <div class="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">Users</div>
                    <div class="text-2xl font-extrabold" id="stat-users">-</div>
                </div>
                <div class="stat-card rounded-xl p-4 flex flex-col gap-1">
                    <div class="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">Messages</div>
                    <div class="text-2xl font-extrabold" id="stat-messages">-</div>
                </div>
                <div class="stat-card rounded-xl p-4 flex flex-col gap-1">
                    <div class="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">Violations</div>
                    <div class="text-2xl font-extrabold text-orange-400" id="stat-violations">-</div>
                </div>
                <div class="stat-card rounded-xl p-4 flex flex-col gap-1">
                    <div class="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">Flagged</div>
                    <div class="text-2xl font-extrabold text-red-400" id="stat-flagged">-</div>
                </div>
                <div class="stat-card rounded-xl p-4 flex flex-col gap-1">
                    <div class="text-[11px] text-gray-500 uppercase tracking-wider font-semibold">Groups</div>
                    <div class="text-2xl font-extrabold text-[#ea3e9a]" id="stat-groups">-</div>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none" role="tablist"
                aria-label="Admin Navigation Tabs">
                <button onclick="switchTab('flagged')" id="tab-flagged" role="tab" aria-selected="true"
                    aria-controls="panel-flagged"
                    class="tab-active glass-btn px-4 py-2 rounded-lg text-xs font-semibold cursor-pointer border flex items-center gap-1.5 whitespace-nowrap">
                    <i class="ph-fill ph-warning"></i> Flagged Users
                </button>
                <button onclick="switchTab('groups')" id="tab-groups" role="tab" aria-selected="false"
                    aria-controls="panel-groups"
                    class="glass-btn px-4 py-2 rounded-lg text-xs font-semibold cursor-pointer border border-white/10 text-gray-400 flex items-center gap-1.5 whitespace-nowrap">
                    <i class="ph ph-folders"></i> Groups
                </button>
                <button onclick="switchTab('boundaries')" id="tab-boundaries" role="tab" aria-selected="false"
                    aria-controls="panel-boundaries"
                    class="glass-btn px-4 py-2 rounded-lg text-xs font-semibold cursor-pointer border border-white/10 text-gray-400 flex items-center gap-1.5 whitespace-nowrap">
                    <i class="ph ph-shield-check"></i> Boundaries
                </button>
                <button onclick="switchTab('violations')" id="tab-violations" role="tab" aria-selected="false"
                    aria-controls="panel-violations"
                    class="glass-btn px-4 py-2 rounded-lg text-xs font-semibold cursor-pointer border border-white/10 text-gray-400 flex items-center gap-1.5 whitespace-nowrap">
                    <i class="ph ph-list-bullets"></i> Violation Log
                </button>
            </div>

            <!-- TAB CONTENT -->

            <!-- Flagged Users Tab -->
            <div id="panel-flagged" role="tabpanel" aria-labelledby="tab-flagged"
                class="glass-card rounded-2xl p-4 md:p-6 fade-in overflow-x-auto">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="ph-fill ph-warning text-red-400"></i> Flagged Users
                </h2>
                <div id="flagged-list" class="flex flex-col gap-3">
                    <p class="text-gray-500 text-sm">Loading...</p>
                </div>
            </div>

            <!-- Groups Tab -->
            <div id="panel-groups" role="tabpanel" aria-labelledby="tab-groups"
                class="glass-card rounded-2xl p-4 md:p-6 fade-in hidden overflow-x-auto">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="ph ph-folders text-[#ea3e9a]"></i> Group Management
                </h2>
                <div class="flex gap-2 mb-5">
                    <input type="text" id="group-name-input" placeholder="Group name..."
                        class="glass-input flex-1 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500">
                    <input type="text" id="group-desc-input" placeholder="Description (optional)..."
                        class="glass-input flex-1 rounded-lg px-3 py-2.5 text-sm text-white placeholder-gray-500">
                    <button onclick="createGroup()"
                        class="glass-btn px-5 py-2.5 rounded-lg font-medium text-sm text-[#ea3e9a] hover:text-white cursor-pointer">Create</button>
                </div>
                <div id="groups-list" class="flex flex-col gap-2">
                    <p class="text-gray-500 text-sm">Loading...</p>
                </div>
            </div>

            <!-- Boundaries Tab -->
            <div id="panel-boundaries" role="tabpanel" aria-labelledby="tab-boundaries"
                class="glass-card rounded-2xl p-4 md:p-6 fade-in hidden overflow-x-auto">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Generic Boundaries -->
                    <div>
                        <h3 class="text-md font-bold mb-3 flex items-center gap-2">
                            <i class="ph ph-globe text-[#ea3e9a]"></i> Generic Boundaries
                        </h3>
                        <div class="flex gap-2 mb-3">
                            <input type="text" id="generic-rule-input" placeholder="e.g. No hate speech..."
                                class="glass-input flex-1 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500">
                            <button onclick="addBoundary('generic')"
                                class="glass-btn px-4 py-2 rounded-lg font-medium text-xs text-[#ea3e9a] cursor-pointer">Add</button>
                        </div>
                        <div id="generic-list" class="flex flex-col gap-2"></div>
                    </div>
                    <!-- Topic Boundaries -->
                    <div>
                        <h3 class="text-md font-bold mb-3 flex items-center gap-2">
                            <i class="ph ph-hash text-green-400"></i> Topic Boundaries
                        </h3>
                        <div class="flex gap-2 mb-3">
                            <select id="group-select"
                                class="glass-input rounded-lg px-2 py-2 text-sm text-gray-300 w-1/3">
                                <option value="">Select Group...</option>
                            </select>
                            <input type="text" id="topic-rule-input" placeholder="e.g. Must be related to..."
                                class="glass-input flex-1 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500">
                            <button onclick="addBoundary('topic')"
                                class="glass-btn px-4 py-2 rounded-lg font-medium text-xs text-green-400 cursor-pointer">Add</button>
                        </div>
                        <div id="topic-list" class="flex flex-col gap-2"></div>
                    </div>
                </div>
            </div>

            <!-- Violations Log Tab -->
            <div id="panel-violations" role="tabpanel" aria-labelledby="tab-violations"
                class="glass-card rounded-2xl p-4 md:p-6 fade-in hidden overflow-x-auto">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="ph ph-list-bullets text-orange-400"></i> Recent Violations
                </h2>
                <div id="violations-list" class="flex flex-col gap-2">
                    <p class="text-gray-500 text-sm">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let isLoggedIn = false;

        // Socket for real-time admin updates
        const socket = io();

        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('chatSession');
            if (session) {
                const currentUser = JSON.parse(session);
                if (currentUser.role === 'admin' || currentUser.role === 'teacher') {
                    isLoggedIn = true;
                    loadAll();
                } else {
                    window.location.href = '/';
                }
            } else {
                window.location.href = '/';
            }
        });

        function openChatAsTeacher() {
            // Temporarily set a flag so index.html knows not to redirect us back
            sessionStorage.setItem('teacherViewingChat', 'true');
            window.location.href = '/';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            isLoggedIn = false;
            localStorage.removeItem('chatSession');
            window.location.href = '/';
        });

        // ========================
        // TABS
        // ========================
        function switchTab(name) {
            ['flagged', 'groups', 'boundaries', 'violations'].forEach(t => {
                const panel = document.getElementById(`panel-${t}`);
                const tab = document.getElementById(`tab-${t}`);
                if (panel && tab) {
                    panel.classList.add('hidden');
                    tab.classList.remove('tab-active');
                    tab.classList.add('text-gray-400', 'border-white/10');
                    tab.setAttribute('aria-selected', 'false');
                }
            });
            const activePanel = document.getElementById(`panel-${name}`);
            const activeTab = document.getElementById(`tab-${name}`);
            if (activePanel && activeTab) {
                activePanel.classList.remove('hidden');
                activeTab.classList.add('tab-active');
                activeTab.classList.remove('text-gray-400', 'border-white/10');
                activeTab.setAttribute('aria-selected', 'true');
            }
        }

        // ========================
        // DATA LOADING
        // ========================
        async function loadAll() {
            await Promise.all([loadStats(), loadFlagged(), loadGroups(), loadBoundaries(), loadViolations()]);
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/admin/stats`);
                const s = await res.json();
                document.getElementById('stat-users').textContent = s.totalUsers;
                document.getElementById('stat-messages').textContent = s.totalMessages;
                document.getElementById('stat-violations').textContent = s.totalViolations;
                document.getElementById('stat-flagged').textContent = s.flaggedUsers;
                document.getElementById('stat-groups').textContent = s.totalGroups;
            } catch (e) { console.error(e); }
        }

        async function loadFlagged() {
            try {
                const res = await fetch(`${API}/admin/flagged-users`);
                const users = await res.json();
                const list = document.getElementById('flagged-list');

                if (users.length === 0) {
                    list.innerHTML = `<div class="text-gray-500 text-sm flex items-center gap-2 py-4"><i class="ph ph-check-circle text-green-400 text-lg"></i> No restricted users. Community is clean!</div>`;
                    return;
                }

                list.innerHTML = users.map(u => {
                    let statusBadge = '';
                    if (u.is_banned) statusBadge = '<span class="badge-danger text-[10px] font-bold px-2 py-1 rounded-full text-white uppercase tracking-wider">Banned</span>';
                    else if (u.cooldown_until && new Date(u.cooldown_until) > new Date()) statusBadge = `<span class="badge-warn text-[10px] font-bold px-2 py-1 rounded-full text-white uppercase tracking-wider">Cooldown (${new Date(u.cooldown_until).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })})</span>`;
                    else if (u.is_flagged) statusBadge = '<span class="badge-danger text-[10px] font-bold px-2 py-1 rounded-full text-white uppercase tracking-wider">Flagged</span>';
                    else if (u.violation_count > 0) statusBadge = `<span class="badge-warn text-[10px] font-bold px-2 py-1 rounded-full text-white uppercase tracking-wider">${u.violation_count} warnings</span>`;

                    return `
                    <div class="flex items-center justify-between bg-black/30 p-4 rounded-xl border border-white/5 hover:border-white/10 transition-colors fade-in">
                        <div class="flex items-center gap-3">
                            <img src="${u.profile_pic_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + encodeURIComponent(u.username)}" class="w-10 h-10 rounded-full object-cover border border-white/10 shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                            <div>
                                <div class="font-semibold text-sm">${escapeHtml(u.name || u.username)} <span class="text-[10px] text-gray-500 font-normal">(${u.role})</span></div>
                                <div class="text-[11px] text-gray-500 mt-0.5">
                                    ${u.violation_count} violation${u.violation_count !== 1 ? 's' : ''}
                                    ${u.last_reason ? ` · Last: "${escapeHtml(u.last_reason.substring(0, 60))}"` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap justify-end">
                            ${statusBadge}
                            <button onclick="relieveUser(${u.id})" class="glass-btn px-3 py-1.5 rounded-lg text-xs font-medium text-green-400 hover:text-white cursor-pointer ml-1">Relieve</button>
                            ${!u.is_banned ? `<button onclick="banUser(${u.id})" class="glass-btn px-3 py-1.5 rounded-lg text-xs font-medium text-red-400 hover:text-white cursor-pointer ml-1 border-red-900/50 hover:bg-red-900/30">Ban</button>` : ''}
                        </div>
                    </div>
                `}).join('');
            } catch (e) { console.error(e); }
        }

        async function loadGroups() {
            try {
                const res = await fetch(`${API}/groups`);
                const groups = await res.json();
                const list = document.getElementById('groups-list');
                const select = document.getElementById('group-select');

                // Update select dropdown
                select.innerHTML = '<option value="">Select Group...</option>';
                groups.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    select.appendChild(opt);
                });

                if (groups.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 text-sm">No groups yet.</p>';
                    return;
                }

                list.innerHTML = groups.map(g => `
                    <div class="flex items-center justify-between bg-black/20 p-3 rounded-xl border border-white/5 hover:border-white/10 transition-colors group">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-[#ea3e9a]/20 flex items-center justify-center text-[#ea3e9a]">
                                <i class="ph ph-hash"></i>
                            </div>
                            <div>
                                <div class="font-semibold text-sm">${escapeHtml(g.name)}</div>
                                <div class="text-[11px] text-gray-500">${g.description ? escapeHtml(g.description) : 'No description'}</div>
                            </div>
                        </div>
                        <button onclick="deleteGroup(${g.id})" class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all cursor-pointer">
                            <i class="ph-fill ph-trash"></i>
                        </button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function loadBoundaries() {
            try {
                const res = await fetch(`${API}/boundaries`);
                const rules = await res.json();
                const genericList = document.getElementById('generic-list');
                const topicList = document.getElementById('topic-list');

                genericList.innerHTML = '';
                topicList.innerHTML = '';

                rules.forEach(rule => {
                    const deleteBtn = `<button onclick="deleteBoundary(${rule.id})" class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity ml-2 cursor-pointer"><i class="ph-fill ph-trash"></i></button>`;

                    const item = document.createElement('div');
                    item.className = "flex justify-between items-start bg-black/20 p-3 rounded-lg border border-white/5 group hover:border-white/10 transition-colors";

                    if (rule.type === 'generic') {
                        item.innerHTML = `<span class="text-sm text-gray-300 pr-2">${escapeHtml(rule.rule_description)}</span> ${deleteBtn}`;
                        genericList.appendChild(item);
                    } else if (rule.type === 'topic') {
                        item.innerHTML = `
                            <div>
                                <span class="text-[10px] font-bold bg-white/10 text-gray-300 px-1.5 py-0.5 rounded uppercase tracking-wide mb-1 inline-block">${escapeHtml(rule.group_name || 'Unknown')}</span>
                                <div class="text-sm text-gray-300">${escapeHtml(rule.rule_description)}</div>
                            </div>
                            ${deleteBtn}
                        `;
                        topicList.appendChild(item);
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function loadViolations() {
            try {
                const res = await fetch(`${API}/admin/violations`);
                const violations = await res.json();
                const list = document.getElementById('violations-list');

                if (violations.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 text-sm flex items-center gap-2"><i class="ph ph-check-circle text-green-400"></i> No violations recorded.</p>';
                    return;
                }

                list.innerHTML = violations.map(v => `
                    <div class="flex items-start gap-3 bg-black/20 p-3 rounded-xl border border-white/5 hover:border-white/10 transition-colors text-sm">
                        <div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-400 flex-shrink-0 mt-0.5">
                            <i class="ph-fill ph-warning text-sm"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="font-semibold text-orange-300">${escapeHtml(v.username)}</span>
                                <span class="text-[10px] text-gray-500">${new Date(v.created_at).toLocaleString()}</span>
                            </div>
                            <div class="text-gray-400 text-xs truncate">"${escapeHtml(v.message_content)}"</div>
                            <div class="text-gray-500 text-[11px] mt-0.5"><i class="ph ph-arrow-right text-[10px]"></i> ${escapeHtml(v.reason)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        // ========================
        // ACTIONS
        // ========================
        async function relieveUser(userId) {
            await fetch(`${API}/admin/relieve/${userId}`, { method: 'POST' });
            loadAll();
        }

        async function banUser(userId) {
            if (!confirm('Are you sure you want to permanently ban this user?')) return;
            await fetch(`${API}/admin/ban/${userId}`, { method: 'POST' });
            loadAll();
        }

        async function createGroup() {
            const name = document.getElementById('group-name-input').value.trim();
            const desc = document.getElementById('group-desc-input').value.trim();
            if (!name) return;

            await fetch(`${API}/groups`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description: desc })
            });
            document.getElementById('group-name-input').value = '';
            document.getElementById('group-desc-input').value = '';
            loadAll();
        }

        async function deleteGroup(id) {
            if (!confirm('Delete this group?')) return;
            await fetch(`${API}/groups/${id}`, { method: 'DELETE' });
            loadAll();
        }

        async function addBoundary(type) {
            let desc, groupId;
            if (type === 'generic') {
                desc = document.getElementById('generic-rule-input').value.trim();
                if (!desc) return;
            } else {
                desc = document.getElementById('topic-rule-input').value.trim();
                groupId = document.getElementById('group-select').value;
                if (!desc || !groupId) return alert('Enter a rule and select a group');
            }

            await fetch(`${API}/boundaries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, rule_description: desc, group_id: groupId || null })
            });
            document.getElementById('generic-rule-input').value = '';
            document.getElementById('topic-rule-input').value = '';
            loadAll();
        }

        async function deleteBoundary(id) {
            await fetch(`${API}/boundaries/${id}`, { method: 'DELETE' });
            loadAll();
        }

        // ========================
        // REAL-TIME UPDATES
        // ========================
        socket.on('adminUpdate', (data) => {
            console.log('Admin update:', data);
            loadAll(); // Refresh everything on any admin event
        });

        // Also poll every 10s for reliability
        setInterval(() => { if (isLoggedIn) loadAll(); }, 10000);

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }
    </script>

</body>

</html>
